<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Conversor Profesional</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 90%; max-width: 420px; text-align: center; border: 1px solid #e2e8f0; }
        h2 { color: #1e293b; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; transition: all 0.3s; }
        input:focus { border-color: #ef4444; outline: none; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1); }
        button { width: 100%; padding: 14px; background: #ef4444; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 700; transition: background 0.2s; }
        button:hover { background: #dc2626; }
        .footer { margin-top: 1.5rem; font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube a MP3</h2>
        <p>Conversor seguro para uso personal</p>
        <input type="text" id="videoUrl" placeholder="Pega el enlace del video aquí..." autocomplete="off">
        <button onclick="procesarDescarga()">Descargar Audio MP3</button>
        <div class="footer">
            Auditado: Compatible con Listas y Shorts.<br>
            Se abrirá el servidor de descarga en una pestaña nueva.
        </div>
    </div>

    <script>
        function procesarDescarga() {
            const input = document.getElementById('videoUrl').value.trim();
            if (!input) {
                alert("Por favor, introduce una dirección de YouTube.");
                return;
            }

            // Auditoría del enlace: Extrae el ID del video incluso con basura en la URL
            let videoId = "";
            const patrones = [
                /(?:v=|\/)([a-zA-Z0-9_-]{11})(?:[&?]|$)/, // watch?v= o enlaces con parámetros
                /youtu\.be\/([a-zA-Z0-9_-]{11})/,         // enlaces cortos
                /shorts\/([a-zA-Z0-9_-]{11})/             // YouTube Shorts
            ];

            for (let patron of patrones) {
                const coincidencia = input.match(patron);
                if (coincidencia) {
                    videoId = coincidencia[1];
                    break;
                }
            }

            if (videoId && videoId.length === 11) {
                // Cambiamos a un servidor de alta disponibilidad (API de 2026)
                const downloadUrl = `https://9xbuddy.com/process?url=https://www.youtube.com/watch?v=${videoId}`;
                window.open(downloadUrl, '_blank');
            } else {
                alert("Enlace no reconocido. Asegúrate de copiarlo directamente de YouTube.");
            }
        }
    </script>
</body>
</html>
