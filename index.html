<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Conversor Personal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #eceff1; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { border-color: #ff0000; outline: none; }
        button { width: 100%; padding: 12px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #cc0000; }
        #downloader { margin-top: 25px; min-height: 100px; display: flex; justify-content: center; align-items: center; background: #f9f9f9; border-radius: 8px; }
        iframe { width: 100%; height: 100px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube a MP3</h2>
        <p>Funciona con cualquier enlace de YouTube</p>
        <input type="text" id="videoUrl" placeholder="Pega aquí el enlace del video...">
        <button onclick="convertir()">Generar Descarga</button>
        <div id="downloader">
            <p style="color: #888; font-size: 14px;">El botón de descarga aparecerá aquí</p>
        </div>
    </div>

    <script>
        function extraerID(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function convertir() {
            const url = document.getElementById('videoUrl').value;
            const id = extraerID(url);
            
            if(!id) {
                alert("Por favor, pega una URL de YouTube válida.");
                return;
            }
            
            // Usamos una API alternativa más estable para 2026
            const iframe = `<iframe src="https://backend.svcon.xyz/?url=https://www.youtube.com/watch?v=${id}&format=mp3&color=ff0000"></iframe>`;
            
            document.getElementById('downloader').innerHTML = iframe;
        }
    </script>
</body>
</html>
