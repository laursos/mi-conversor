<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Descargador Seguro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        .card { background: #2d2d2d; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: none; border-radius: 8px; font-size: 14px; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #b20710; }
        .info { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube a MP3</h2>
        <p>Introduce el enlace del video</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="descargar()">DESCARGAR AHORA</button>
        <div class="info">
            La descarga se procesará en una pestaña limpia.<br>
            Sin instalaciones ni registros.
        </div>
    </div>

    <script>
        function descargar() {
            const val = document.getElementById('videoUrl').value.trim();
            if(!val) return alert("Pega un enlace");

            // Extraemos el ID del video de forma ultra-simple
            let id = "";
            if(val.includes("v=")) id = val.split("v=")[1].split("&")[0];
            else if(val.includes("youtu.be/")) id = val.split("youtu.be/")[1].split("?")[0];
            else if(val.includes("shorts/")) id = val.split("shorts/")[1].split("?")[0];

            if(id.length === 11) {
                // Usamos un servidor de descarga directa mucho más estable
                const serverUrl = `https://y2mate.nu/es-ES/download?url=https://www.youtube.com/watch?v=${id}`;
                window.open(serverUrl, '_blank');
            } else {
                alert("Enlace no válido. Asegúrate de que sea un video de YouTube.");
            }
        }
    </script>
</body>
</html>
