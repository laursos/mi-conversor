<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Conversor Personal MP3</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 60px; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YouTube a MP3</h2>
        <p>Solo pega el enlace y presiona descargar.</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="convertir()">Descargar MP3</button>
        
        <!-- Contenedor del convertidor -->
        <div id="downloader"></div>
    </div>

    <script>
        function convertir() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Pega una URL");
            
            // Usamos un widget de descarga gratuito (API pública)
            const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            const iframe = `<iframe src="https://api.vevioz.com/@api/button/mp3/${id}"></iframe>`;
            
            document.getElementById('downloader').innerHTML = iframe;
        }
    </script>
</body>
</html>
